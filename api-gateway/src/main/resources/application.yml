server:
  port: 8080

jwt:
  secret: my-super-ultra-secret-key-for-jwt-auth-256-bit

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**

            - id: user-service
              uri: http://localhost:8082
              predicates:
                - Path=/users/**

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    org.springframework.cloud.gateway: DEBUG